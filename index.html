<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers - Join Our Team</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: #000;
        }

        a {
            color: #ccc;
            text-decoration: none;
        }

        a:hover {
            color: #fff;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        /* CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: #222;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 15px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #666;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        .close {
            float: right;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <header>
        <h2>Company Careers</h2>
        <a href="#">Home</a>
    </header>

    <section class="hero">
        <h1>Join Our Team</h1>
        <p>We hire based on skills, not resumes.</p>

        <div class="stats">
            <div>120+ Members</div>
            <div>4 Offices</div>
            <div>Remote</div>
        </div>
    </section>

    <section class="grid" id="job-grid">
        <p style="text-align: center; color: #888;">Loading open positions...</p>
    </section>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-box" style="width: 450px;">
            <span class="close" onclick="closeModal()">X</span>
            <h3 id="modal-role-title">AI Interview</h3>
            <p id="q1-text" style="margin-top: 10px; font-weight: bold;">1. Tell me about a problem you solved.</p>
            <input type="url" id="github-url" placeholder="Your GitHub Profile or Portfolio URL" style="width: 100%; border-radius: 5px; padding: 10px; margin-top: 5px; background: #333; color: white; border: none; box-sizing: border-box;" required />
            <textarea id="interview-answer" rows="3" style="width: 100%; border-radius: 5px; padding: 10px; margin-top: 10px; background: #333; color: white; border: none; box-sizing: border-box;" placeholder="Type your experience answer here..." required></textarea>
            
            <p id="q2-title" style="margin-top: 15px; font-weight: bold; color: #4da6ff;">2. Coding Challenge:</p>
            <p id="q2-desc" style="font-size: 14px; margin: 5px 0;">Write a function <code>reverseString(str)</code> that returns the reversed string.</p>
            <textarea id="coding-answer" rows="4" style="width: 100%; border-radius: 5px; padding: 10px; background: #1a1a1a; color: #00ff00; border: 1px solid #444; font-family: monospace; box-sizing: border-box;" placeholder="function reverseString(str) {&#10;  // Your code here&#10;}" required></textarea>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="test-btn" onclick="runTests()" type="button" style="flex: 1; background: #333; color: #4da6ff; border: 1px solid #4da6ff; font-weight: bold;">Run Tests</button>
                <button id="submit-btn" onclick="submitAnswer()" style="flex: 1; background: #444; color: white;">Submit Application</button>
            </div>
            
            <div id="test-results" style="margin-top: 10px; font-size: 13px; font-family: monospace; text-align: left; padding: 5px; background: #111; border-radius: 5px; display: none;"></div>
            <p id="feedback-msg" style="margin-top: 10px; font-size: 14px;"></p>
        </div>
    </div>

    <script>
        let currentRole = '';
        let passedTests = 0;
        let totalTests = 4;
        let testRunStatus = 'Not Run';
        
        // Define role-specific questions and tests
        const roleData = {
            "Frontend Developer": {
                q1: "1. Tell me about a challenging UI bug you successfully fixed.",
                q2Title: "2. Javascript Coding Challenge:",
                q2Desc: "Write a function <code>reverseString(str)</code> that returns the reversed string.",
                q2Placeholder: "function reverseString(str) {\n  // Your code here\n}",
                hasTests: true,
                testWrapper: "return typeof reverseString !== 'undefined' ? reverseString(str) : null;",
                testCases: [
                    { input: "hello", expected: "olleh" },
                    { input: "React", expected: "tcaeR" },
                    { input: "a", expected: "a" },
                    { input: "", expected: "" }
                ]
            },
            "Backend Developer": {
                q1: "1. How do you approach designing a scalable RESTful API?",
                q2Title: "2. Algorithm Challenge (Javascript):",
                q2Desc: "Write a function <code>isPalindrome(str)</code> returning true if the string is a palindrome.",
                q2Placeholder: "function isPalindrome(str) {\n  // Your code here\n  // return true or false;\n}",
                hasTests: true,
                testWrapper: "return typeof isPalindrome !== 'undefined' ? isPalindrome(str) : null;",
                testCases: [
                    { input: "racecar", expected: true },
                    { input: "hello", expected: false },
                    { input: "level", expected: true }
                ]
            },
            "Data Scientist": {
                q1: "1. Explain how you would prevent overfitting in a machine learning model.",
                q2Title: "2. Python/Pandas Pseudocode Test:",
                q2Desc: "Write Python or pseudocode to drop null values and group by 'category' in a dataframe 'df'.",
                q2Placeholder: "# Import pandas\n\n# Your logic here to process 'df'",
                hasTests: false
            },
            "Product Manager": {
                q1: "1. Tell me about a time you had to align stakeholders with differing opinions.",
                q2Title: "2. Product Case Study:",
                q2Desc: "How would you prioritize building a chat feature versus a better search feature?",
                q2Placeholder: "My methodology for prioritizing features would be...",
                hasTests: false
            },
            "Default": {
                q1: "1. Tell me about your most proud professional achievement.",
                q2Title: "2. Scenario Question:",
                q2Desc: "Describe how you would handle an impossible deadline from leadership.",
                q2Placeholder: "I would...",
                hasTests: false
            }
        };

        // Fetch jobs from Python backend on page load
        window.onload = async () => {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/jobs');
                if (response.ok) {
                    const jobs = await response.json();
                    renderJobs(jobs);
                } else {
                    document.getElementById('job-grid').innerHTML = '<p style="text-align: center; color: #ff4444;">Failed to load jobs from Python API.</p>';
                    loadMockJobs();
                }
            } catch (error) {
                console.error("Error fetching jobs:", error);
                document.getElementById('job-grid').innerHTML = '<p style="text-align: center; color: #ffbb33;">Python Backend offline. Loaded in Demo Mode.</p>';
                loadMockJobs();
            }
        };

        function loadMockJobs() {
            setTimeout(() => {
                const mockJobs = [
                    { "id": 1, "title": "Frontend Developer (Demo)", "description": "Build modern UI with React & Vue" },
                    { "id": 2, "title": "Backend Developer (Demo)", "description": "Build robust APIs with Python & Node.js" },
                    { "id": 3, "title": "UI/UX Designer (Demo)", "description": "Create accessible and stunning user experiences" },
                    { "id": 4, "title": "Product Manager (Demo)", "description": "Lead product vision from ideation to launch" },
                    { "id": 5, "title": "Data Scientist (Demo)", "description": "Analyze large datasets and train machine learning models" },
                    { "id": 6, "title": "DevOps Engineer (Demo)", "description": "Manage cloud infrastructure and CI/CD pipelines" },
                    { "id": 7, "title": "Full Stack Engineer (Demo)", "description": "Develop end-to-end features on web and mobile" },
                    { "id": 8, "title": "HR Manager (Demo)", "description": "Drive talent acquisition and company culture" },
                    { "id": 9, "title": "Marketing Specialist (Demo)", "description": "Grow user engagement through targeted campaigns" },
                    { "id": 10, "title": "QA Tester (Demo)", "description": "Ensure high-quality software through automated testing" }
                ];
                renderJobs(mockJobs);
            }, 600);
        }

        function renderJobs(jobs) {
            const grid = document.getElementById('job-grid');
            grid.innerHTML = ''; // clear loading text

            jobs.forEach(job => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${job.title}</h3>
                    <p>${job.description}</p>
                    <button onclick="openModal('${job.title}')">Start Interview</button>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(role) {
            // Strip out (Demo) for matching logic
            const cleanRole = (role || 'General Candidate').replace(' (Demo)', '');
            currentRole = cleanRole;
            
            document.getElementById("modal-role-title").innerText = `Interview: ${cleanRole}`;
            
            // Get questions for role, or default
            let config = roleData[cleanRole];
            if (!config) {
                // If it's a generic Engineer or something else not perfectly hardcoded
                if (cleanRole.includes('Engineer') || cleanRole.includes('Tester')) {
                    config = roleData["Backend Developer"]; 
                } else if (cleanRole.includes('Designer') || cleanRole.includes('Marketing') || cleanRole.includes('HR')) {
                    config = roleData["Product Manager"]; // Good enough default for non-coding
                } else {
                    config = roleData["Default"];
                }
            }
            
            // Fill UI
            document.getElementById("q1-text").innerHTML = config.q1;
            document.getElementById("q2-title").innerHTML = config.q2Title;
            document.getElementById("q2-desc").innerHTML = config.q2Desc;
            document.getElementById("coding-answer").placeholder = config.q2Placeholder;
            
            if (config.hasTests) {
                document.getElementById("test-btn").style.display = "block";
            } else {
                document.getElementById("test-btn").style.display = "none";
            }
            
            document.getElementById("modal").style.display = "flex";
            document.getElementById("feedback-msg").innerText = '';
            document.getElementById("github-url").value = '';
            document.getElementById("interview-answer").value = '';
            document.getElementById("coding-answer").value = '';
            document.getElementById("submit-btn").disabled = false;
            document.getElementById("test-results").style.display = 'none';
            document.getElementById("test-results").innerHTML = '';
            passedTests = 0;
            testRunStatus = config.hasTests ? 'Not Run' : 'N/A: Text Question';
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function runTests() {
            // Find current config
            let config = roleData[currentRole];
            if (!config) {
                 if (currentRole.includes('Engineer') || currentRole.includes('Tester')) config = roleData["Backend Developer"]; 
                 else config = roleData["Default"];
            }
            
            if (!config.hasTests) return; // safeguard
            
            totalTests = config.testCases.length;

            const code = document.getElementById("coding-answer").value;
            const resultsDiv = document.getElementById("test-results");
            resultsDiv.style.display = "block";
            resultsDiv.innerHTML = "Running tests...<br>";
            resultsDiv.style.color = "#ccc";
            
            try {
                // Create a testing environment wrapper
                const testFunc = new Function("str", code + "\n" + config.testWrapper);
                
                let passed = 0;
                let outputHtml = "";
                
                config.testCases.forEach((tc, i) => {
                    const result = testFunc(tc.input);
                    if (result === tc.expected) {
                        passed++;
                        outputHtml += `<span style="color:#00C851;">✔ Test ${i+1} Passed</span><br>`;
                    } else if (result === null) {
                        outputHtml += `<span style="color:#ff4444;">✖ Test ${i+1} Failed: Expected function not detected</span><br>`;
                    } else {
                        outputHtml += `<span style="color:#ff4444;">✖ Test ${i+1} Failed: expected "${tc.expected}", got "${result}"</span><br>`;
                    }
                });
                
                passedTests = passed;
                testRunStatus = `${passed}/${totalTests} Passed`;
                
                if (passed === testCases.length) {
                    outputHtml += `<br><strong style="color:#00C851;">All tests passed! Ready to submit.</strong>`;
                } else {
                    outputHtml += `<br><strong style="color:#ffbb33;">${passed}/${testCases.length} tests passed. Keep trying!</strong>`;
                }
                
                resultsDiv.innerHTML = outputHtml;
                
            } catch (err) {
                resultsDiv.innerHTML = `<span style="color:#ff4444;">Syntax Error or Execution Failed:<br>${err.message}</span>`;
                passedTests = 0;
                testRunStatus = "Error";
            }
        }

        async function submitAnswer() {
            const githubUrl = document.getElementById("github-url").value;
            const answer = document.getElementById("interview-answer").value;
            const codingAnswer = document.getElementById("coding-answer").value;
            const feedbackMsg = document.getElementById("feedback-msg");
            const submitBtn = document.getElementById("submit-btn");

            if (!githubUrl.trim() || !answer.trim() || !codingAnswer.trim()) {
                feedbackMsg.innerText = "Please provide your GitHub URL, an experience answer, and a coding answer.";
                feedbackMsg.style.color = "#ff4444";
                return;
            }

            // AI GITHUB URL CHECK
            // Check if it's a properly formatted GitHub URL
            const githubRegex = /^(https?:\/\/)?(www\.)?github\.com\/([a-zA-Z0-9-]+)\/?$/;
            const match = githubUrl.trim().match(githubRegex);
            
            if (!match) {
                feedbackMsg.innerText = "Please provide a valid GitHub profile URL (e.g., https://github.com/username).";
                feedbackMsg.style.color = "#ff4444";
                return;
            }

            const username = match[3];

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.innerText = "Verifying GitHub Profile...";
            feedbackMsg.innerText = "";
            
            // Calculate an automated preliminary grade
            let autoGrade = "Pending";
            let config = roleData[currentRole];
            if (!config) {
                 if (currentRole.includes('Engineer') || currentRole.includes('Tester')) config = roleData["Backend Developer"]; 
                 else config = roleData["Default"];
            }

            if (config.hasTests) {
                if (testRunStatus.includes(`${totalTests}/${totalTests}`)) autoGrade = "A";
                else if (testRunStatus.includes("Passed") && passedTests > 0) autoGrade = "B";
                else if (testRunStatus === "Error") autoGrade = "F";
                else autoGrade = "Pending (Untested)";
            } else {
                if (answer.length > 150) autoGrade = "A";
                else if (answer.length > 60) autoGrade = "B";
                else autoGrade = "C";
            }

            try {
                // Verify the profile exists using the real GitHub API
                let githubCheck = null;
                try {
                    githubCheck = await fetch(`https://api.github.com/users/${username}`);
                } catch(ghError) {
                    console.warn("GitHub API unreachable, skipping verification:", ghError);
                }
                
                if (githubCheck) {
                    if (githubCheck.status === 404) {
                        feedbackMsg.innerText = `GitHub profile '${username}' was not found. Please check your URL.`;
                        feedbackMsg.style.color = "#ff4444";
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Submit Answer";
                        return;
                    } else if (!githubCheck.ok && githubCheck.status !== 403) {
                        // It failed for some reason other than a rate limit (which is 403)
                        feedbackMsg.innerText = "Could not verify profile with GitHub at this time, but we will still submit your application.";
                        feedbackMsg.style.color = "#ffbb33"; // Orange warning color
                    }
                }

                // If we get here, the profile is real (or github just rate-limited our API check!)
                submitBtn.innerText = "Submitting...";

                // Send data to our Python Flask Backend
                try {
                    const response = await fetch('http://127.0.0.1:5000/api/interview/submit', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            role: currentRole,
                            githubUrl: githubUrl,
                            answer: answer,
                            codingAnswer: codingAnswer,
                            testScore: testRunStatus,
                            grade: autoGrade
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        feedbackMsg.innerText = "Successfully submitted to Python backend! We will get back to you.";
                        feedbackMsg.style.color = "#00C851";
                        setTimeout(closeModal, 2000); // Auto close after 2s
                    } else {
                        feedbackMsg.innerText = data.error || "Failed to submit.";
                        feedbackMsg.style.color = "#ff4444";
                    }
                } catch (backendError) {
                    // Backend offline fallback using local storage
                    console.warn("Backend offline, saving submission locally", backendError);
                    let existing = [];
                    try {
                        existing = JSON.parse(localStorage.getItem('mockSubmissions') || '[]');
                        if (!Array.isArray(existing)) existing = [];
                    } catch(e) {}
                    
                    existing.push({
                        role: currentRole,
                        githubUrl: githubUrl,
                        answer: answer,
                        codingAnswer: codingAnswer,
                        testScore: testRunStatus,
                        grade: autoGrade,
                        submittedAt: new Date().toISOString()
                    });
                    localStorage.setItem('mockSubmissions', JSON.stringify(existing));
                    
                    feedbackMsg.innerText = "Demo Mode: Application safely saved locally!";
                    feedbackMsg.style.color = "#00C851";
                    setTimeout(closeModal, 2000);
                }
            } catch (error) {
                console.error("Submission error:", error);
                feedbackMsg.innerText = "Failed to submit. Please try again.";
                feedbackMsg.style.color = "#ff4444";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Answer";
            }
        }
    </script>
</body>

</html>
